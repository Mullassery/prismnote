name: Build & Release Binaries

# Triggered by pushing a version tag (e.g. v0.4.4) or run manually.
# Builds the self-contained server binary (frontend is embedded via rust-embed)
# for macOS, Linux, and Windows, and uploads them to the GitHub Release using
# the exact asset names the pip/curl launcher expects (raw binaries, not archives).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build & attach to (e.g. v0.4.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin
            cross: false
            # one arm64 build serves every Apple-Silicon name the launcher maps
            names: prismnote-macos-arm64 prismnote-macos-m1 prismnote-macos-m2 prismnote-macos-m3 prismnote-macos-m4 prismnote-macos-m5 prismnote-macos-m6 prismnote-macos-m7 prismnote-macos-m8
          - label: macOS intel
            runner: macos-13
            target: x86_64-apple-darwin
            cross: false
            names: prismnote-macos-intel prismnote-macos-x86_64
          - label: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: true
            names: prismnote-linux-x86_64
          - label: Linux arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            names: prismnote-linux-aarch64
          - label: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            names: prismnote-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      # Build the frontend FIRST — rust-embed bakes ../../frontend/dist into the binary.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p prismnote_server

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: |
          cargo install cross --locked || true
          cross build --release --target ${{ matrix.target }} -p prismnote_server

      - name: Stage release assets (raw binaries, launcher-named)
        shell: bash
        run: |
          mkdir -p staging
          BIN="target/${{ matrix.target }}/release/prismnote"
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          for name in ${{ matrix.names }}; do
            cp "$BIN" "staging/$name"
          done
          (cd staging && shasum -a 256 * > "checksums-${{ matrix.target }}.txt" 2>/dev/null || true)
          ls -lh staging

      - uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.target }}
          path: staging/*
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -lhR dist
      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ inputs.tag }}}" >> "$GITHUB_OUTPUT"
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PrismNote ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
