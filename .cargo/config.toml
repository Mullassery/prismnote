# Cargo configuration for multi-platform builds

[build]
# Target-specific build settings

[target.aarch64-apple-darwin]
# Apple Silicon (M1, M2, M3, M4, M5, M6, M7, M8)
# Optimized for native ARM64 execution
rustflags = ["-C", "link-arg=-mmacosx-version-min=11.0"]

[target.x86_64-apple-darwin]
# Intel Mac
# Requires macOS 10.7+
rustflags = ["-C", "link-arg=-mmacosx-version-min=10.7"]

[target.x86_64-unknown-linux-gnu]
# Linux x86_64
# Standard Linux build

[target.aarch64-unknown-linux-gnu]
# Linux ARM64
# For Raspberry Pi 4/5, etc.

[target.armv7-unknown-linux-gnueabihf]
# Linux ARMv7
# For older Raspberry Pi, etc.

[target.x86_64-pc-windows-msvc]
# Windows x86_64
# MSVC toolchain

[target.aarch64-pc-windows-msvc]
# Windows ARM64
# For Surface devices with ARM processors
